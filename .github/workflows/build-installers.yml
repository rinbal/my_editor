name: Build installers

# Builds the one-click installers for all three platforms and, when triggered by
# a version tag (vX.Y.Z), attaches them to a GitHub Release. Use the manual
# "Run workflow" button (workflow_dispatch) to test a build without tagging.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
          - os: macos-latest      # Apple Silicon (arm64)
            name: macos-arm64
          - os: macos-13          # Intel (x86_64) -- remove this entry to drop Intel support
            name: macos-intel
          - os: ubuntu-22.04      # older glibc => runs on a wide range of distros
            name: linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Qt's xcb platform plugin needs libxcb-cursor at runtime (Qt >= 6.5).
      # Install it BEFORE PyInstaller so it gets bundled into the AppImage.
      - name: Install Linux system libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libegl1 libxkbcommon0 libfuse2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build app bundle (PyInstaller)
        run: pyinstaller --noconfirm packaging/my_editor.spec

      - name: Package Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = python -c "import constants; print(constants.APP_VERSION)"
          choco install innosetup --no-progress -y
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$version packaging\windows\installer.iss

      - name: Package macOS disk image
        if: runner.os == 'macOS'
        run: bash packaging/macos/build_dmg.sh

      - name: Package Linux AppImage
        if: runner.os == 'Linux'
        run: bash packaging/linux/build_appimage.sh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.name }}
          path: |
            dist/*-setup.exe
            dist/*.dmg
            dist/*.AppImage
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: ls -R artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          fail_on_unmatched_files: true
